<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&display=swap"
      rel="stylesheet"
    />
    <title>INCOME EXPENSE CALCULATOR</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#dcfcef]">
    <!-- common div -->
    <div class="flex justify-center items-center">
      <div class="rounded-lg w-[1000px] mt-10">
        <h1 class="text-center font-bold text-2xl">
          Income and Expense calculator
        </h1>
        <div class="flex justify-around mt-5">
          <div tabindex="0" class="card">
            <h1 class="text-[18px]">Total Income</h1>
            <p id="income" class="text-2xl text-[#00e673]">0</p>
          </div>

          <div tabindex="0" class="card">
            <h1 class="text-[18px]">Total Expense</h1>
            <p id="expense" class="text-2xl text-[#e62e00]">0</p>
          </div>

          <div tabindex="0" class="card">
            <h1 class="text-[18px]">Net Balance</h1>
            <p id="balance" class="text-2xl">0</p>
          </div>
        </div>

        <!-- sec -->

        <div class="flex justify-between mt-4 flex-wrap">
          <!-- input feilds  description and amount-->

          <div class="flex flex-col justify-center items-center gap-3">
            <label for="description">Description:</label>
            <input
              type="text"
              id="description"
              class="bg-white h-16 w-96 pl-2"
              placeholder="eg.salary"
            />
            <label for="amount">Amount:</label>
            <input
              type="number"
              id="amount"
              class="bg-white h-16 w-96 pl-2"
              placeholder="0.00"
            />

            <!-- radio  button -->

            <div class="flex gap-6 mb-6 mt-2">
              <h1 class="flex justify-start font-semibold text-2xl">
                Categorie:
              </h1>
              <div>
                <input
                  type="radio"
                  id="income-radio"
                  value="income"
                  name="type"
                  checked
                />
                <label for="income">Income</label>
              </div>

              <div>
                <input
                  type="radio"
                  id="expense-radio"
                  value="expense"
                  name="type"
                />
                <label for="expense">Expense</label>
              </div>
            </div>

            <div class="flex gap-6 text-white">
              <button type="submit" id="add" class="bg-[#426ff5] px-8 py-2">
                Add
              </button>
              <button type="reset" class="bg-[#b3b3b3] px-8">Reset</button>
            </div>
          </div>

          <!-- Transaction   -->
          <div>
            <h1 class="text-2xl font-semibold">Filter your transactions</h1>
            <div class="flex gap-3">
              <div>
                <input type="radio" id="all-radio-btn" name="category" checked />
                <label for="all-radio-btn">All</label>
              </div>

              <div>
                 <input type="radio" id="income-radio-btn" name="category" />
               <label for="income-radio-btn">income</label>
              </div>
             
               <div>
                 <input type="radio" id="expense-radio-btn" name="category" />
                 <label for="expense-radio-btn">expense</label>
               </div>
             
            </div>
            <div
              class="w-[500px] h-[350px] border-2 border-gray-400 rounded-lg"
            >
              <h1 class="text-xl font-semibold p-2 text-[#]">Transactions :</h1>
              <div id="transactionList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
